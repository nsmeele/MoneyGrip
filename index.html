<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interest-Calculator</title>
    <script>
      (function(){var p=sessionStorage.getItem('spa-redirect');if(p){sessionStorage.removeItem('spa-redirect');history.replaceState(null,'',p)}})();
    </script>
    <script>
      (function(){var t=localStorage.getItem('theme');if(!t)t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.dataset.theme=t})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
